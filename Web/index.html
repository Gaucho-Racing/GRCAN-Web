<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
	<title>GRCAN Viewer</title>
	<script>
		(function () {
			var s = document.createElement("style");
			s.textContent =
				":root{--_sat:env(safe-area-inset-top,0px);--_sab:env(safe-area-inset-bottom,0px)}";
			document.head.appendChild(s);
			var cs = getComputedStyle(document.documentElement);
								var top = parseFloat(cs.getPropertyValue("--_sat")) || 0;
			var bottom = parseFloat(cs.getPropertyValue("--_sab")) || 0;
			var root = document.documentElement.style;
			if (top > 0) root.setProperty("--sat", top + "px");
			if (bottom > 0) root.setProperty("--sab", bottom + "px");
			s.remove();
		})();
	</script>
	<link rel="stylesheet" href="index.css?v=3" />
	<link rel="stylesheet" href="viewer.css?v=6" />
	<link rel="stylesheet" href="editor.css?v=8" />
	<link rel="stylesheet" href="graphView.css?v=4" />
</head>

<body>
	<canvas id="bg-canvas"></canvas>

	<header id="mobile-appbar">
		<button id="appbar-back" type="button" aria-label="Back" hidden>
			<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
				stroke-linecap="round" stroke-linejoin="round">
				<path d="M15 18l-6-6 6-6" />
			</svg>
		</button>
		<h1 id="appbar-title">GRCAN Viewer</h1>
		<button id="appbar-menu" type="button" aria-label="Menu">
			<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
				stroke-linecap="round" stroke-linejoin="round">
				<line x1="4" x2="20" y1="7" y2="7" />
				<line x1="4" x2="20" y1="12" y2="12" />
				<line x1="4" x2="20" y1="17" y2="17" />
			</svg>
		</button>
	</header>

	<div class="app-shell">
		<aside class="app-sidebar">
			<h1>GRCAN Viewer</h1>
			<p class="description">
				View <b>GRCAN.CANdo</b> from any branch, tag, or commit in the
				<a href="https://grlink.to/monorepo">Firmware monorepo</a>.
			</p>
			<p class="description description-muted">
				Simple navigation: bus -> node -> message.
			</p>

			<div id="ref-input-row">
				<label class="input-label" for="ref-select">Reference</label>
				<select id="ref-select">
					<option value="">Loading references...</option>
				</select>
			</div>

			<div id="local-file-row" style="margin-top: 12px">
				<label style="
							display: flex;
							align-items: center;
							gap: 6px;
							cursor: pointer;
							font-size: 13px;
							color: #9aa3b0;
						">
					<input type="checkbox" id="local-toggle" />
					Use local file
				</label>
				<input type="file" id="local-file-input" accept=".CANdo,.cando,.txt"
					style="display: none; margin-top: 6px; font-size: 12px" />
			</div>

			<button id="edit-mode-toggle" type="button" class="sidebar-btn sidebar-btn-edit">
				Edit Mode
			</button>

			<button id="download-btn" type="button" class="sidebar-btn sidebar-btn-download">
				Download GRCAN.CANdo
			</button>

			<button id="graph-view-btn" type="button" class="sidebar-btn sidebar-btn-graph">
				Graph View
			</button>
		</aside>

		<main class="viewer-host">
			<div id="viewer-search-row">
				<input type="text" id="viewer-search" placeholder="Search nodes, buses, messages..." />
			</div>
			<div id="viewer" data-step="0">
				<div class="viewer-track">
					<div class="panel" id="bus-panel">
						<div class="panel-header">Bus</div>
						<div class="panel-list" id="bus-list">
							<span class="placeholder">Select a ref</span>
						</div>
					</div>
					<div class="panel" id="node-panel">
						<div class="panel-header">Nodes</div>
						<div class="panel-list" id="node-list">
							<span class="placeholder">Select a bus</span>
						</div>
					</div>
					<div class="panel" id="msg-panel">
						<div class="panel-header">Messages</div>
						<div class="panel-list" id="msg-list">
							<span class="placeholder">Select a node</span>
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>

	<div id="mobile-menu-backdrop" class="sheet-backdrop" hidden></div>
	<div id="mobile-menu-sheet" class="sheet" hidden role="dialog" aria-label="Menu">
		<div class="sheet-grabber"></div>
		<div id="sidebar-mount"></div>
	</div>

	<!-- Script load order is significant: each layer depends on the ones above.
		     logic.js      → GrcanApi  (data / GitHub API / parsers)
		     formUtils.js  → FormUtils (shared form DOM helpers + validators)
		     editor.js     → GrcanEditor core (mutation engine, no forms)
		     form*.js      → each augments GrcanEditor with one show* method
		     diffViewer.js → DiffViewer (standalone diff modal)
		     viewer.js     → main controller (rendering + edit-mode wiring)
		     background.js → decorative canvas (no dependencies) -->
	<script src="physicalTopology.js?v=1"></script>
	<script src="physicalGroups.js"></script>
	<script src="logic.js?v=5"></script>
	<script src="formUtils.js?v=2"></script>
	<script src="editor.js?v=5"></script>
	<script src="candoDocument.js?v=5"></script>
	<script src="formMessageDef.js?v=1"></script>
	<script src="formCustomCanId.js?v=1"></script>
	<script src="formRoutingAdd.js?v=4"></script>
	<script src="formNodeEdit.js?v=2"></script>
	<script src="formBusEdit.js?v=1"></script>
	<script src="formBusAdd.js?v=1"></script>
	<script src="formConfirmDelete.js?v=1"></script>
	<script src="formSuperAdd.js?v=1"></script>
	<script src="diffViewer.js?v=3"></script>
	<script src="viewer.js?v=17"></script>
	<script src="layoutPhysicalBus.js"></script>
	<script src="graphView.js?v=5"></script>
	<script src="background.js?v=3"></script>
</body>

</html>
